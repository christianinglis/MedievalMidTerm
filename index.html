<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blades of Reckoning</title>
</head>
<body>

    <h1>Blades of Reckoning</h1>

    <img id="story-image" src="map.jpg" alt="Story Image">

    <p id="paragraph1">You stand at the entrance of a mysterious castle.</p>
    <p id="paragraph2">Three paths are in front of you.</p>
    <p id="paragraph3">Where will you go?</p>

    <div>
        <button id="graveyardButton">Go to the Graveyard</button>
        <button id="basementButton">Go to the Basement</button>
        <button id="castleButton">Go to the Top of the Castle</button>
    </div>
    
    <div>
        <button id="fightButton">Fight</button>
        <button id="bribeButton">Bribe</button>
        <button id="friendlyButton">Be Friendly</button>
        <button id="backButton">Back</button>
    </div>

    <div>
        <input id="treasureInput" placeholder="Enter Treasure code">
        <button id="submitButton">Submit Guess</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
